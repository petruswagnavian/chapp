<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Leaflet Historical Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    <style>
        html, body, #map {height: 100%; margin: 0; padding: 0;}
        .polity-popup .leaflet-popup-content {
            font-family: 'Georgia', serif;
            color: #000;
            text-align: center;
            font-size: 12px;
        }
        .polity-popup .leaflet-popup-content-wrapper {
            background-color: #F5CE47;
            border-radius: 8px;
            border: none;
            box-shadow: 0 0 0 2px black, 0 0 8px rgba(0,0,0,0.3);
            max-width: 200px;
        }
        .polity-popup .leaflet-popup-tip {
            background: #F5CE47;
            border: none;
            box-shadow: 0 0 0 2px black;
        }
        .cluster-avatar-icon {
            border-radius: 30px;
            border: none;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            overflow: visible;
        }
        .cluster-avatar-icon .cluster-avatar {
            width: 32px;
            height: 32px;
            position: relative;
            border-radius: 30px;
            overflow: visible;
        }
        .cluster-avatar-icon .cluster-avatar img {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 30px;
        }
        .cluster-avatar-icon .cluster-badge {
            position: absolute;
            right: -6px; bottom: -6px;
            width: 10px; height: 18px; padding: 0 4px;
            border-radius: 30px; background: #111; color: #fff;
            font: 700 11px/18px Georgia; text-align: center;
            border: 2px solid #fff
        }
    </style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script>
    //import colors from "tailwindcss/colors";

    let currentLayer = null;
    let polityFeatures = [];
    let personMarkers = [];
    let lastMapVersion = 0;
    let lastPersonsVersion = 0;
    let colors = {};
    const canvasRenderer = L.canvas({padding: 1.25})
    const map = L.map('map', {
        zoomControl: false,
        attributionControl: false,
        minZoom: 2,
        maxZoom: 8,
        doubleClickZoom: false,
        inertia: false,
        zoomSnap: 0,
        //inertiaDeceleration: 800, //default 3000, lower is less glide
        //inertiaMaxSpeed: 300, //lower stops sooner
        unloadInvisibleTiles: false,
        updateWhenIdle: false,
        updateWhenZooming: true,
        preferCanvas: true,
        tap: false
    })

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}', {
        keepBuffer: 4,
        unloadInvisibleTiles: false,
        updateWhenIdle: false,
        updateWhenZooming: true,
        attribution: 'Tiles © Esri — Source: National Geographic, Esri, Garmin, HERE, UNEP-WCMC, USGS, NASA, ESA'
    }).addTo(map);

    map.setView([40, 30], 3) //[lat, lng, zoomlevel] //starts at zoom = 3
    map.setMaxBounds([
        [-85, -180], //SW corner
        [85, 180], //NE corner
    ])

    //panes
    //map.createPane('polityPane'); map.getPane('polityPane').style.zIndex = "700"; //polities are at 400?
    map.createPane('markerPane'); map.getPane('markerPane').style.zIndex = "500";
    map.createPane('clusterPane'); map.getPane('clusterPane').style.zIndex = "500";

    function clearMap() {
        if (currentLayer) {
            currentLayer.eachLayer(l => { l.closePopup(); l.unbindPopup(); l.off(); });
            currentLayer.remove();
            currentLayer = null;
        }
    }
    const clusterCycleIndex = new WeakMap();
    const personClusterGroup = L.markerClusterGroup({
        maxClusterRadius: 40, //default 80
        showCoverageOnHover: false,
        zoomToBoundsOnClick: false,
        spiderfyOnClick: false,
        spiderfyOnEveryZoom: false,
        animate: true,
        singleMarkerMode: false,
        pane: 'clusterPane',
        /*
        spiderfyDistanceMultiplier: 3,
        spiderLegPolylineOptions: {
            color: '#000',
            weight: 1,
            opacity: 0,
            pane: 'spiderfyPane',
        },

         */

        iconCreateFunction: (cluster) => {
            const children = cluster.getAllChildMarkers();
            const i = (clusterCycleIndex.get(cluster) || 0) % children.length;
            //avatar for dynamic clusters
            const avatar = children[i].options.imageUrl;
            const count = cluster.getChildCount();
            const clusterColor = children[i].options.campColor;
            const html = `
            <div class="cluster-avatar" style="
                border: 2px solid ${clusterColor};
            ">
                <img src="${avatar}" alt="">
                <span class="cluster-badge">${count}</span>
            </div>
            `;
            return L.divIcon({
                html,
                className: "cluster-avatar-icon",
                iconSize: [32, 32],
                iconAnchor: [20, 20],
                popupAnchor: [0, 0]
            })
        }
    })

    map.addLayer(personClusterGroup);

    L.MarkerCluster.prototype.spiderfy = function () {
        return this; //actually disables spiderfy animation
    }
    personClusterGroup.on('clusterclick', (e) => {
        e.originalEvent.preventDefault();
        e.originalEvent.stopPropagation();

        const markers = e.layer.getAllChildMarkers();
        const data = markers.map(m => ({
            pid: m.options.pid,
            displayName: m.options.displayName,
            imageUrl: m.options.imageUrl,
            //camps: m.options.camps,
            //mainCamp: m.options.mainCamp,
            campColor: m.options.campColor,
        }))
        window.ReactNativeWebView?.postMessage(JSON.stringify({
            type: 'OPEN_CLUSTER_PANEL',
            markers: data
        }))
    })

    personClusterGroup._getExpandedVisibleBounds = function() {
        return map.getBounds().pad(1.25);
    }

    function clearPersonMarkers() {
        if (personMarkers) {
            personMarkers.forEach(m => {
                m.off();
                map.removeLayer(m);
            })
            personClusterGroup.clearLayers();
            personMarkers = [];
        }
    }
    function addPersonMarker(lat, lon, pid, displayName, imageUrl, camps, mainCamp, campColor) {
        //let campKey = mainCamp || (camps && camps.length > 0 ? camps[0] : null);
        //let campColor = (campKey && campKey && colors.camp[campKey]) ? colors.camp[campKey] : "#000";
        const icon = L.divIcon({
            pane: 'markerPane',
            html: `
                    <img src="${imageUrl}" style="
                    width: 30px;
                    height: 30px;
                    border-radius: 30px;
                    border: 2px solid ${campColor};
                    box-shadow: 0 0 5px rgba(0,0,0,0.5);
                    "/>
                `,
            className: '',
            iconSize: [40, 40],
            iconAnchor: [20, 20],
            popupAnchor: [0, 0]
        })
        const marker = L.marker([lat, lon], {
            pid: pid,
            displayName: displayName,
            imageUrl: imageUrl,
            icon: icon,
            //camps: camps,
            //mainCamp: mainCamp,
            campColor: campColor,
        }).on('click', () => {
            window.ReactNativeWebView?.postMessage(`open_person:${pid}`);
        })
        personClusterGroup.addLayer(marker);
        personMarkers.push(marker);
    }
    function startClusterCycler(group, intervalMs = 2000) {
        let t = null;
        const tick = () => {
            group._featureGroup.eachLayer(layer => {
                if (typeof layer.getChildCount === 'function') { //only clusters
                    const children = layer.getAllChildMarkers();
                    if (!children.length) return;
                    const next = ((clusterCycleIndex.get(layer) || 0) + 1) % children.length;
                    clusterCycleIndex.set(layer, next);
                }
            })
            group.refreshClusters();
        }
        const start = () => {if (!t) t = setInterval(tick, intervalMs)};
        const stop = () => {if (t) clearInterval(t), t = null};

        group.on('animationstart', stop);
        group.on('animationend', start);
        map.on('movestart zoomstart', stop);
        map.on('moveend zoomend', start);

        start();
    }
    startClusterCycler(personClusterGroup, 2000);

    function onEachPolity(feature, layer) {
        const name = feature.properties.DisplayName;
        layer.bindPopup(`<b>${name}</b>`, {
            className: 'polity-popup',
            closeButton: false
        })
        layer.on('popupopen', (e) => {
            const popup = e.popup;
            const contentArea = popup.getElement();
            if (contentArea) {
                contentArea.addEventListener('click', () => {
                    map.closePopup(popup);
                })
            }
        })
        polityFeatures.push({
            feature,
            layer,
            tooltip: null
        })
    }

    /*
    function getPolityStyle(feature) {
        const c = feature.properties.Color
        const interactive = map.getZoom() >= 3
        return {
            color: '#000',
            weight: 0.5,
            fillColor: c,
            fillOpacity: 0.5,
            interactive
        }
    }
    map.on('zoomend', () => currentLayer && currentLayer.setStyle(getPolityStyle))
    */

    function handleMessage(event) {
        const message = JSON.parse(event.data);
        console.log("received message: ", message);

        if (message.type === 'UPDATE_YEAR') {
            const v = message.version || 0;
            if (v <= lastMapVersion) return;
            lastMapVersion = v;

            clearMap();
            //polities
            currentLayer = L.geoJSON(message.geojson, {
                //pane: 'polityPane',
                style: (f) => ({
                    color: '#000',
                    weight: 0.5,
                    fillColor: f.properties.Color,
                    fillOpacity: 0.5,
                }),
                onEachFeature: onEachPolity,
                renderer: canvasRenderer,
                interactive: true,
                noClip: false
            }).addTo(map)
            return;
        }

        if (message.type === 'UPDATE_PERSONS') {
            const v = message.personsVersion || 0;
            if (v <= lastPersonsVersion) return;
            lastPersonsVersion = v;

            clearPersonMarkers();
            (message.persons || []).forEach((p) =>
                addPersonMarker(p.lat, p.lon, p.pid, p.displayName, p.imageUrl, p.camps, p.mainCamp, p.campColor)
            )
        }

        if (message.type === 'SET_COLORS') {
            colors = message.colors;
        }
    }

    //bind once
    if (!window.__msgBound) {
        document.addEventListener('message', handleMessage);
        window.__msgBound = true;
    }
    //window.addEventListener('message', handleMessage);
    //map.on('zoomend', updateLabelsForZoom);
</script>
</body>
</html>
