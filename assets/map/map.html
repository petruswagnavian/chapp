<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Leaflet Historical Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        html, body, #map {height: 100%; margin: 0; padding: 0;}
        .polity-popup .leaflet-popup-content {
            font-family: 'Georgia', serif;
            color: #000;
            text-align: center;
            font-size: 12px;
        }
        .polity-popup .leaflet-popup-content-wrapper {
            background-color: #F5CE47;
            border-radius: 8px;
            border: none;
            box-shadow: 0 0 0 2px black, 0 0 8px rgba(0,0,0,0.3);
            max-width: 200px;
        }

        .polity-popup .leaflet-popup-tip {
            background: #F5CE47;
            border: none;
            box-shadow: 0 0 0 2px black;
        }
        /*
        .polity-label {
            font-weight: bold;
            color: #111;
            text-shadow: 1px 1px 2px white;
            pointer-events: none;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }

        .leaflet-tooltip {
            background: transparent;
            border: none;
            box-shadow: none;
            pointer-events: none;
        }
        */
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        let currentLayer = null;
        let polityFeatures = [];
        let personMarkers = [];
        let lastMapVersion = 0;
        let lastPersonsVersion = 0;
        const canvasRenderer = L.canvas({padding: 0.25})
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false,
            minZoom: 2,
            maxZoom: 8,
            doubleClickZoom: false,
            inertia: false,
            //inertiaDeceleration: 100, //default 3000, lower is less glide
            //inertiaMaxSpeed: 100, //lower stops sooner
            unloadInvisibleTiles: false,
            updateWhenIdle: false,
            updateWhenZooming: true,
            preferCanvas: true,
        })

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}', {
            keepBuffer: 4,
            unloadInvisibleTiles: false,
            updateWhenIdle: false,
            updateWhenZooming: true,
            attribution: 'Tiles © Esri — Source: National Geographic, Esri, Garmin, HERE, UNEP-WCMC, USGS, NASA, ESA'
        }).addTo(map);

        map.setView([40, 20], 3) //[lat, lng, zoomlevel] //starts at zoom = 3
        map.setMaxBounds([
            [-85, -180], //SW corner
            [85, 180], //NE corner
        ])
        function clearMap() {
            if (currentLayer) {
                currentLayer.eachLayer(l => { l.closePopup(); l.unbindPopup(); l.off(); });
                currentLayer.remove();
                currentLayer = null;
            }
        }
        function clearPersonMarkers() {
            if (personMarkers) {
                personMarkers.forEach(m => {
                    m.off();
                    map.removeLayer(m);
                })
                personMarkers = [];
            }
        }
        function addPersonMarker(pid, lat, lon, imageUrl) {
            const icon = L.divIcon({
                html: `
                    <img src="${imageUrl}" style="
                    width: 30px;
                    height: 30px;
                    border-radius: 30px;
                    border: 2px solid white;
                    box-shadow: 0 0 5px rgba(0,0,0,0.5);
                    "/>
                `,
                className: '',
                iconSize: [40, 40],
                iconAnchor: [20, 20],
                popupAnchor: [0, -20]
            })
            const marker = L.marker([lat, lon], {icon}).on('click', () => {
                window.ReactNativeWebView?.postMessage(`open_person:${pid}`)
            }).addTo(map);
            personMarkers.push(marker);
        }

        function getPolityStyle(feature) {
            const c = feature.properties.Color
            const interactive = map.getZoom() >= 3
            return {
                color: '#000',
                weight: 0.5,
                fillColor: c,
                fillOpacity: 0.5,
                interactive
            }
        }
        map.on('zoomend', () => currentLayer && currentLayer.setStyle(getPolityStyle))

        function onEachPolity(feature, layer) {
            const name = feature.properties.DisplayName;
            layer.bindPopup(`<b>${name}</b>`, {
                className: 'polity-popup',
                closeButton: false
            })
            layer.on('popupopen', (e) => {
                const popup = e.popup;
                const contentArea = popup.getElement();
                if (contentArea) {
                    contentArea.addEventListener('click', () => {
                        map.closePopup(popup);
                    })
                }
            })
            polityFeatures.push({
                feature,
                layer,
                tooltip: null
            })
        }

        /*
        function updateLabelsForZoom() {
            const zoom = map.getZoom();
            currentTooltips.forEach(t => map.removeLayer(t));
            currentTooltips = [];

            polityFeatures.forEach(({feature, layer}) => {

                if (zoom >= zoomThreshold) {

                    const tooltip = L.tooltip({
                        permanent: true,

                        .setLatLng(layer.getBounds().getCenter());
                    tooltip.addTo(map);
                    currentTooltips.push(tooltip);
                }
            })
        }*/
        function handleMessage(event) {
            const message = JSON.parse(event.data);
            //console.log("received message: ", message);

            if (message.type === 'UPDATE_YEAR') {
                const v = message.version || 0;
                if (v <= lastMapVersion) return;
                lastMapVersion = v;

                clearMap();
                currentLayer = L.geoJSON(message.geojson, {
                    style: getPolityStyle,
                    onEachFeature: onEachPolity,
                    renderer: canvasRenderer,
                    noClip: false
                }).addTo(map)
                //updateLabelsForZoom();
                return;
            }

            if (message.type === 'UPDATE_PERSONS') {
                const v = message.personsVersion || 0;
                if (v <= lastPersonsVersion) return;
                lastPersonsVersion = v;

                clearPersonMarkers();
                (message.persons || []).forEach((p) =>
                    addPersonMarker(p.pid, p.lat, p.lon, p.imageUrl)
                )
            }
        }

        //bind once
        if (!window.__msgBound) {
            document.addEventListener('message', handleMessage);
            window.__msgBound = true;
        }
        //window.addEventListener('message', handleMessage);
        //map.on('zoomend', updateLabelsForZoom);
    </script>
</body>
</html>
