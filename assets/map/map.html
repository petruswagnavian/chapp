<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Leaflet Historical Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        html, body, #map {height: 100%; margin: 0; padding: 0;}
        /*
        .polity-label {
            font-weight: bold;
            color: #111;
            text-shadow: 1px 1px 2px white;
            pointer-events: none;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }
        */
        .leaflet-tooltip {
            background: transparent;
            border: none;
            box-shadow: none;
            pointer-events: none;
        }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        let currentLayer = null;
        let currentTooltips = [];
        let polityFeatures = [];
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false,
            minZoom: 2,
            maxZoom: 7,
            inertia: true,
            inertiaDeceleration: 1000, //default 3000, lower is less glide
            inertiaMaxSpeed: 1000 //lower stops sooner
        })

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/' +
            'Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}', {
            attribution:
                'Tiles © Esri — Source: Esri, HERE, Garmin, NGA, USGS, NPS'
        }).addTo(map);

        map.setView([40, 20], 3) //[lat, lng, zoomlevel] //starts at zoom = 4
        map.setMaxBounds([
            [-85, -180], //SW corner
            [85, 180], //NE corner
        ])

        function getPolityStyle(feature) {
            const c = feature.properties.Color
            return {
                color: c,
                weight: 0.5,
                fillColor: c,
                fillOpacity: 0.3,
                interactive: true
            }
        }

        function onEachPolity(feature, layer) {
            const name = feature.properties.DisplayName;
            layer.bindPopup(`<b>${name}</b>`);
            polityFeatures.push({
                feature,
                layer,
                tooltip: null
            })
        }
        function updateLabelsForZoom() {
            const zoom = map.getZoom();
            currentTooltips.forEach(t => map.removeLayer(t));
            currentTooltips = [];
            /*
            polityFeatures.forEach(({feature, layer}) => {
                const name = feature.properties.DisplayName;
                const area = feature.properties.Area;

                let zoomThreshold = 10;

                if (area > 500000) {
                    zoomThreshold = 3;
                }
                else if (area > 400000) {
                    zoomThreshold = 4;
                }
                else if (area > 300000) {
                    zoomThreshold = 5;
                }
                else {
                    zoomThreshold = 6;
                }

                if (zoom >= zoomThreshold) {
                    const fontSize = 3;
                    const tooltip = L.tooltip({
                        permanent: true,
                        direction: 'center',
                        className: 'polity-label',
                        opacity: 1
                    })
                        .setContent(`<div style="font-size:${fontSize}">${name}</div>`)
                        .setLatLng(layer.getBounds().getCenter());
                    tooltip.addTo(map);
                    currentTooltips.push(tooltip);
                }
            })*/
        }
        function handleMessage(event) {
            const message = JSON.parse(event.data);
            console.log("received message: ", message);
            if (message.type === 'UPDATE_YEAR') {
                if (currentLayer) {
                    map.removeLayer(currentLayer)
                    console.log("removed previous map layer")
                }
                currentTooltips.forEach(t => map.removeLayer(t));
                currentTooltips = [];
                polityFeatures = [];

                currentLayer = L.geoJSON(message.geojson, {
                    style: getPolityStyle,
                    onEachFeature: onEachPolity
                }).addTo(map)

                updateLabelsForZoom();
            }
        }
        document.addEventListener('message', handleMessage);
        window.addEventListener('message', handleMessage);
        map.on('zoomend', updateLabelsForZoom);
    </script>
</body>
</html>
